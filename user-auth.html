<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập & Đăng ký</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">PTIT - Hệ thống Thi Trắc Nghiệm</div>
      </div>
    </header>

    <main class="container auth-page">
      <section class="hero-card">
        <h1>Hệ thống thi trắc nghiệm trực tuyến</h1>
        <p>Trang đăng nhập dành cho sinh viên</p>
      </section>

      <section class="auth-layout">
        <div class="panel auth-panel">
          <div class="tab-switcher" role="tablist" aria-label="Chọn form">
            <button id="loginTab" class="tab-btn active" role="tab" aria-selected="true">Đăng nhập</button>
            <button id="registerTab" class="tab-btn" role="tab" aria-selected="false">Đăng ký</button>
          </div>

          <form id="loginForm" class="auth-form" novalidate>
            <h2>Đăng nhập tài khoản</h2>
            <label for="loginUsername">Tên đăng nhập</label>
            <input id="loginUsername" name="username" type="text" placeholder="Nhập tên đăng nhập" required />

            <label for="loginPassword">Mật khẩu</label>
            <input id="loginPassword" name="password" type="password" placeholder="Nhập mật khẩu" required />

            <button type="submit" class="btn btn-primary">Đăng nhập</button>
            <p class="hint">Tài khoản mặc định: <b>student</b> / <b>123456</b>.</p>
            <p class="switch-auth-link">Đăng nhập quản trị? <a href="admin-login.html">Admin Login</a></p>
            <p id="loginMessage" class="form-message" aria-live="polite"></p>
          </form>

          <form id="registerForm" class="auth-form hidden" novalidate>
            <h2>Tạo tài khoản mới</h2>
            <label for="registerName">Tên người dùng</label>
            <input id="registerName" name="name" type="text" placeholder="VD: Nguyen Van A" required />

            <label for="registerEmail">Email</label>
            <input id="registerEmail" name="email" type="email" placeholder="VD: sv@ptit.edu.vn" required />

            <label for="registerPassword">Mật khẩu</label>
            <input id="registerPassword" name="password" type="password" placeholder="Tối thiểu 6 ký tự" required />

            <label for="registerConfirmPassword">Xác nhận mật khẩu</label>
            <input id="registerConfirmPassword" name="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required />

            <button type="submit" class="btn btn-primary">Đăng ký</button>
            <p id="registerMessage" class="form-message" aria-live="polite"></p>
          </form>
        </div>
        <div class="logo-wrap">
          <img src="assets/images/Logo_PTIT.png" alt="Logo PTIT" class="ptit-logo" />
        </div>
        
      </section>
    </main>

    <script src="assets/js/shared-data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
